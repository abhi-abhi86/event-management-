<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Events - Event Volunteer Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>

<body class="text-slate-800 antialiased min-h-screen flex flex-col bg-slate-50">

    <!-- Navbar -->
    <nav class="bg-indigo-600 text-white shadow-md z-10 sticky top-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="index.html" class="flex items-center gap-3 hover:opacity-90 transition">
                    <i data-lucide="tent" class="w-6 h-6"></i>
                    <span class="font-bold text-xl tracking-tight">Event Volunteer Management System</span>
                </a>
                <div class="flex items-center gap-4 text-sm font-medium">
                    <a href="login.html" class="hover:text-indigo-200 transition">Login</a>
                    <a href="login.html" class="bg-white text-indigo-600 px-4 py-2 rounded-lg shadow-sm hover:bg-indigo-50 transition">Sign Up</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">Upcoming Opportunities</h1>
                <p class="text-slate-500 mt-2">Browse 30 upcoming events that need volunteer support.</p>
            </div>
            <div class="relative w-full max-w-xs">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i data-lucide="search" class="w-4 h-4 text-slate-400"></i>
                </div>
                <input type="text" placeholder="Search events..." class="pl-10 w-full rounded-lg border border-slate-300 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm bg-white">
            </div>
        </div>

        <!-- 30 Events Grid Container -->
        <div id="events-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-12">
            <!-- Generated by JavaScript below -->
        </div>
    </main>

    <script>
        // Generate 30 Event Cards Dynamically
        const eventsGrid = document.getElementById('events-grid');

        // Sample event types to cycle through
        const eventTypes = [
            'Community Park Cleanup', 'Local Food Drive', 'Marathon Route Guide',
            'Tech Conference Helper', 'Charity Gala Assistant', 'Animal Shelter Support',
            'Youth Sports Day', 'Neighborhood Block Party', 'Beach Restoration', 'Library Reading Buddy'
        ];

        let htmlContent = '';

        for (let i = 1; i <= 30; i++) {
            // Pick a repeating title and generate dynamic dates/images
            const title = eventTypes[i % eventTypes.length];
            const randomSeed = 1000 + i; // Used for unique images
            const day = (i % 28) + 1;

            htmlContent += `
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-lg transition-shadow duration-300 flex flex-col">
                    <img src="https://picsum.photos/seed/${randomSeed}/400/200" alt="${title}" class="w-full h-40 object-cover border-b border-slate-100">
                    <div class="p-5 flex flex-col flex-grow">
                        <span class="text-xs font-bold text-indigo-600 uppercase tracking-wider mb-1">Event #${i}</span>
                        <h3 class="text-lg font-bold text-slate-900 leading-tight mb-2">${title}</h3>
                        <div class="text-slate-500 text-sm flex items-center gap-2 mb-4">
                            <i data-lucide="calendar" class="w-4 h-4"></i> Oct ${day}, 2026
                        </div>
                        <div class="mt-auto pt-4 border-t border-slate-100">
                            <button class="w-full bg-indigo-50 text-indigo-700 py-2 rounded-lg font-medium text-sm hover:bg-indigo-100 transition">Sign Up to Volunteer</button>
                        </div>
                    </div>
                </div>
            `;
        }

        eventsGrid.innerHTML = htmlContent;
        lucide.createIcons();
    </script>
</body>

</html>
