<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Event Volunteer Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    },
                }
            }
        }
    </script>
</head>

<body class="text-slate-800 antialiased min-h-screen flex">

    <!-- Left Side Image Background -->
    <div class="hidden lg:flex w-1/2 bg-cover bg-center relative" style="background-image: url('https://images.unsplash.com/photo-1552664730-d307ca884978?ixlib=rb-4.0.3&auto=format&fit=crop&w=1080&q=80');">
        <div class="absolute inset-0 bg-indigo-900/60 mix-blend-multiply"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-indigo-900/90 via-indigo-900/40 to-transparent"></div>
        <div class="relative z-10 flex flex-col justify-end p-12 text-white h-full w-full">
            <a href="index.html" class="flex items-center gap-3 mb-6 hover:opacity-90 transition">
                <i data-lucide="tent" class="w-10 h-10"></i>
                <span class="font-bold text-3xl tracking-tight">Event Volunteer Management System</span>
            </a>
            <h1 class="text-4xl font-bold mb-4">Make an impact.</h1>
            <p class="text-indigo-100 text-lg max-w-md">Join our community of volunteers and organizers to bring amazing events to life.</p>
        </div>
    </div>

    <!-- Right Side Login Section -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 bg-slate-50">
        <div class="w-full max-w-md space-y-8 bg-white p-10 rounded-2xl shadow-sm border border-slate-200">
            <div class="text-center">
                <h2 id="login-heading" class="text-2xl font-bold text-slate-900">Welcome back</h2>
                <p id="login-subtext" class="text-sm text-slate-500 mt-2">Please enter your details to sign in.</p>
            </div>

            <!-- User Type Toggle Section -->
            <div class="flex p-1 space-x-1 bg-slate-100 rounded-lg">
                <button class="w-1/2 py-2 text-sm font-medium rounded-md bg-white shadow text-slate-900 transition" id="tab-volunteer">
                    Volunteer Login
                </button>
                <button class="w-1/2 py-2 text-sm font-medium rounded-md text-slate-500 hover:text-slate-700 transition" id="tab-admin">
                    Admin Login
                </button>
            </div>

            <form id="loginForm" class="mt-8 space-y-6">
                <div class="space-y-4">
                    <div>
                        <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email address</label>
                        <input id="email" name="email" type="email" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 shadow-sm" placeholder="you@example.com">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                        <input id="password" name="password" type="password" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 shadow-sm" placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-slate-300 rounded">
                        <label for="remember-me" class="ml-2 block text-sm text-slate-700">Remember me</label>
                    </div>
                    <div class="text-sm">
                        <a href="#" class="font-medium text-indigo-600 hover:text-indigo-500">Forgot your password?</a>
                    </div>
                </div>

                <div>
                    <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition">
                        Sign in
                    </button>
                </div>
            </form>

            <div class="text-center mt-4">
                <p class="text-sm text-slate-500">
                    Don't have an account?
                    <a href="#" class="font-medium text-indigo-600 hover:text-indigo-500">Sign up</a> or
                    <a href="events.html" class="font-medium text-indigo-600 hover:text-indigo-500">Browse Events</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let currentRole = 'volunteer'; // Default role

        // Initialize 40 dummy volunteers if not present
        function initVolunteerData() {
            if (!localStorage.getItem('registeredVolunteers')) {
                const events = ['Community Park Cleanup', 'Local Food Drive', 'Marathon Route Guide', 'Tech Conference Helper', 'Charity Gala Assistant', 'Animal Shelter Support', 'Youth Sports Day', 'Neighborhood Block Party', 'Beach Restoration', 'Library Reading Buddy'];
                const vols = [];
                // Add 80 dummy records
                for (let i = 1; i <= 80; i++) {
                    vols.push({
                        email: `volunteer${i}@example.com`,
                        eventTitle: events[i % events.length],
                        date: new Date(Date.now() - Math.floor(Math.random() * 10000000000)).toLocaleDateString()
                    });
                }
                localStorage.setItem('registeredVolunteers', JSON.stringify(vols));
            }
        }
        initVolunteerData();

        // Check for event parameters in URL
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('event_id');
        const eventTitle = urlParams.get('event_title');

        if (eventId && eventTitle) {
            document.getElementById('login-heading').textContent = 'Sign in to Register';
            document.getElementById('login-subtext').textContent = `You are signing up for: ${eventTitle}`;
        }

        // Handle Login Submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent default form submission
            const email = document.getElementById('email').value;
            localStorage.setItem('isLoggedIn', 'true'); // Set a simple login token
            localStorage.setItem('userRole', currentRole); // Store the selected role
            localStorage.setItem('userEmail', email); // Store logged-in user's email

                const vols = JSON.parse(localStorage.getItem('registeredVolunteers') || '[]');

                    email: email,

                });

                    }];

                    const nameParts = email.split('@')[0].split(/[\.\-_]/);
                    const name = nameParts.map(p => p.charAt(0).toUpperCase() + p.slice(1)).join(' ');
                    eventflowVols.unshift({
                        id: Date.now().toString(),
                        name: name,
                        email: email,
                        role: eventTitle ? eventTitle : 'Volunteer',
                        status: 'Pending'
                    });
                    localStorage.setItem('eventflow_volunteers', JSON.stringify(eventflowVols));
                }

                if (eventId) {
                    alert(`Successfully logged in and registered for event: ${eventTitle}!`);
                }
            }

            window.location.href = 'index.html'; // Redirect to dashboard
        });

        // Tab switching logic for Volunteer/Admin
        const tabVolunteer = document.getElementById('tab-volunteer');
        const tabAdmin = document.getElementById('tab-admin');

        // Initialize active tab visual
        tabVolunteer.className = 'w-1/2 py-2 text-sm font-medium rounded-md bg-white shadow text-slate-900 transition';
        tabAdmin.className = 'w-1/2 py-2 text-sm font-medium rounded-md text-slate-500 hover:text-slate-700 transition';

        tabVolunteer.addEventListener('click', () => {
            tabVolunteer.className = 'w-1/2 py-2 text-sm font-medium rounded-md bg-white shadow text-slate-900 transition';
            tabAdmin.className = 'w-1/2 py-2 text-sm font-medium rounded-md text-slate-500 hover:text-slate-700 transition';
            currentRole = 'volunteer';
        });

        tabAdmin.addEventListener('click', () => {
            tabAdmin.className = 'w-1/2 py-2 text-sm font-medium rounded-md bg-white shadow text-slate-900 transition';
            tabVolunteer.className = 'w-1/2 py-2 text-sm font-medium rounded-md text-slate-500 hover:text-slate-700 transition';
            currentRole = 'admin';
        });
    </script>
</body>

</html>
